name: Build PDF

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Tectonic
        uses: tectonic-actions/setup-tectonic@v2

      - name: Build PDF
        run: tectonic Thesis.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: Thesis.pdf
          if-no-files-found: error
